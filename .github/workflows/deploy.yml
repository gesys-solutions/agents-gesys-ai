name: Build & Deploy — agents-gesys-ai

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_REGISTRY: acrgesys.azurecr.io
  IMAGE_NAME: agents-gesys-ai
  RESOURCE_GROUP: rg-gesys-apps
  CA_STAGING: ca-agents-gesys-ai-staging
  CA_PROD: ca-agents-gesys-ai-prod

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "tag=$SHA" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push (staging tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App — staging
        run: |
          az containerapp update \
            --name ${{ env.CA_STAGING }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:staging

      - name: Verify HTTP 200
        run: |
          URL="https://$(az containerapp show \
            --name ${{ env.CA_STAGING }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)"
          echo "Staging URL: $URL"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App — prod
        run: |
          az containerapp update \
            --name ${{ env.CA_PROD }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Verify HTTP 200
        run: |
          URL="https://$(az containerapp show \
            --name ${{ env.CA_PROD }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)"
          echo "Prod URL: $URL"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
